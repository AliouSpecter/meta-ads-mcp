<svg width="1280" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font-family: 'Courier New', monospace; font-weight: 900; fill: #E8865A; letter-spacing: 2px; }
      .subtitle { font-family: 'Courier New', monospace; font-weight: 400; fill: #ffffff; letter-spacing: 4px; }
      .command { font-family: 'Courier New', monospace; font-weight: 400; fill: #444d58; font-size: 32px; text-anchor: end; }
      .tagline { font-family: 'Courier New', monospace; fill: #cccccc; letter-spacing: 2px; }
      .divider { stroke: #E8865A; stroke-width: 2; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1280" height="400" fill="#0d1117"/>

  <!-- Subtle grid overlay -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#161b22" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1280" height="400" fill="url(#grid)" opacity="0.6"/>

  <!-- CLAUDE big text -->
  <text x="60" y="160" class="title" font-size="120">CLAUDE</text>

  <!-- META ADS MCP -->
  <text x="60" y="260" class="title" font-size="100">META ADS</text>
  <text x="60" y="350" class="title" font-size="80">MCP</text>

  <!-- Orange divider line -->
  <line x1="60" y1="375" x2="520" y2="375" class="divider"/>

  <!-- Tagline -->
  <text x="60" y="398" class="tagline" font-size="16">AI-Powered Meta Ads</text>

  <!-- Commands right side -->
  <text x="1220" y="80" class="command">/campaigns</text>
  <text x="1220" y="130" class="command">/pixel audit</text>
  <text x="1220" y="180" class="command">/catalog</text>
  <text x="1220" y="230" class="command">/insights</text>
  <text x="1220" y="280" class="command">/report</text>
  <text x="1220" y="330" class="command">/ad sets</text>
  <text x="1220" y="380" class="command">/performance</text>
</svg>
